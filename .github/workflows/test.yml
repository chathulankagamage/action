name: Demo Workflow with Manual Approval

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ── STEP 1: Checkout ──────────────────────────────────────────────
  checkout:
    name: "Step 1 · Checkout"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo info
        run: |
          echo "✅ Checked out branch: ${{ github.ref_name }}"
          echo "📦 Repo: ${{ github.repository }}"
          echo "🔖 Commit: ${{ github.sha }}"

  # ── STEP 2: Build + Upload Artifact ───────────────────────────────
  build:
    name: "Step 2 · Build & Upload Artifact"
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Simulate build output
        run: |
          echo "🔨 Building the project..."
          mkdir -p build-output
          echo "Build version: 1.0.0"        > build-output/version.txt
          echo "Built at: $(date)"           >> build-output/version.txt
          echo "Commit: ${{ github.sha }}"   >> build-output/version.txt
          echo "✅ Build successful!"
          cat build-output/version.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output          # artifact name (visible in GitHub UI)
          path: build-output/         # folder to upload
          retention-days: 7           # auto-delete after 7 days

  # ── MANUAL APPROVAL GATE ──────────────────────────────────────────
  approval-gate:
    name: "⏸ Waiting for Manual Approval"
    runs-on: ubuntu-latest
    needs: build
    environment: qa
    steps:
      - name: Approval granted
        run: echo "🎉 Approval received! Proceeding to deploy..."

  # ── STEP 3: Deploy ────────────────────────────────────────────────
  deploy:
    name: "Step 3 · Deploy"
    runs-on: ubuntu-latest
    needs: approval-gate
    steps:
      - name: Simulate deployment
        run: |
          echo "🚀 Deploying to production..."
          sleep 2
          echo "✅ Deployment complete!"

  # ── STEP 4: Notify ────────────────────────────────────────────────
  notify:
    name: "Step 4 · Notify"
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Send notification
        run: |
          echo "📣 Notifying team..."
          echo "Deployed commit ${{ github.sha }} by ${{ github.actor }}"
          echo "✅ Notification sent!"
